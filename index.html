<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Berlin Ortsteile Map</title>
    <meta name="description" content="Interactive map of Berlin's districts and neighborhoods." />
    
    <!-- Google Fonts for Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <!-- App Container -->
    <main id="app">
      <!-- Info Overlay -->
      <header id="info-panel" class="glass-panel">
        <!-- Menu & Mode Switcher -->
        <div style="display: flex; justify-content: space-between; align-items: stretch; margin-bottom: 12px;">
          <!-- Mode Switcher -->
          <div class="mode-switcher" style="margin-bottom: 0; flex: 1; display: flex; align-items: center;">
            <button id="btn-lernen" class="mode-btn active">Lernen</button>
            <button id="btn-spielen" class="mode-btn">Spielen</button>
            <button id="btn-restart-game" title="Spiel neu starten" style="background: transparent; border: none; color: white; width: 36px; height: 36px; cursor: pointer; display: none; align-items: center; justify-content: center; margin-left: 4px; transition: opacity 0.3s; opacity: 0.8;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
            </button>
          </div>
          
          <!-- Settings Dropdown Toggle -->
          <div class="settings-container" style="position: relative; margin-left: 12px; display: flex; align-items: stretch;">
            <button id="btn-settings" title="Einstellungen" style="background: rgba(0,0,0,0.3); border: none; color: white; border-radius: 8px; width: 44px; height: auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">⚙️</button>
            <div id="settings-menu" class="glass-panel hidden" style="padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px;">
              
              <div style="display: flex; flex-direction: column; gap: 4px;">
                <label for="region-select" style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">Auswahl der Region:</label>
                <select id="region-select" class="dropdown-select">
                  <option value="alle">alle 97 Ortsteile</option>
                  <option value="mitte_fk">8 Ortsteile - Mitte + Friedrichshain-Kreuzberg</option>
                  <option value="reinickendorf">11 Ortsteile - Reinickendorf</option>
                  <option value="pankow">13 Ortsteile - Pankow</option>
                  <option value="spandau">9 Ortsteile - Spandau</option>
                  <option value="charlottenburg_wilmersdorf">7 Ortsteile - Charlottenburg-Wilmersdorf</option>
                  <option value="lichtenberg_marzahn">15 Ortsteile - Lichtenberg + Marzahn-Hellersdorf</option>
                  <option value="steglitz_zehlendorf">8 Ortsteile - Steglitz-Zehlendorf</option>
                  <option value="tempelhof_neukoelln">11 Ortsteile - Tempelhof-Schöneberg + Neukölln</option>
                  <option value="treptow_koepenick">15 Ortsteile - Treptow-Köpenick</option>
                  <option value="custom">Benutzerdefiniert</option>
                </select>
                <button id="btn-config-filter" class="action-btn hidden" style="padding: 6px; font-size: 0.8rem; margin-top: 4px;">Filter konfigurieren</button>
              </div>

              <label style="display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);">
                <input type="checkbox" id="toggle-error-names" style="margin-right: 8px;" checked>
                Namen bei Fehler zeigen
              </label>
            </div>
          </div>
        </div>

        <div id="lernen-content">
          <h1 id="bezirk-title">Berlin</h1>
          <p id="ortsteil-name">Wähle einen Ortsteil</p>
        </div>

        <div id="spielen-content" class="hidden">
          <p class="spielen-prompt">Finde:</p>
          <h1 id="target-name">Mitte</h1>
          <div class="game-status">
            <div id="chances" class="chances">
              <span class="chance dot"></span>
              <span class="chance dot"></span>
              <span class="chance dot"></span>
            </div>
            <span id="progress-text">0/97</span>
          </div>
        </div>
      </header>

      <!-- Map Container -->
      <div id="map"></div>

      <!-- Statistics Modal -->
      <div id="stats-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
          <h2>Statistik</h2>
          <div class="stats-grid">
            <div class="stat-box"><span class="stat-value" id="stat-time">00:00</span><span class="stat-label">Zeit</span></div>
            <div class="stat-box green"><span class="stat-value" id="stat-green">0</span><span class="stat-label">1. Versuch</span></div>
            <div class="stat-box orange"><span class="stat-value" id="stat-orange">0</span><span class="stat-label">2./3. Versuch</span></div>
            <div class="stat-box red"><span class="stat-value" id="stat-red">0</span><span class="stat-label">Fehler</span></div>
          </div>
          <button id="btn-restart" class="action-btn">Neu Spielen</button>
        </div>
      </div>

      <!-- Custom Filter Modal -->
      <div id="filter-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel" style="max-width: 500px; padding: 20px;">
          <h2 style="font-size: 1.5rem; margin-bottom: 16px;">Benutzerdefinierter Filter</h2>
          
          <div class="io-section" style="display: flex; gap: 8px; margin-bottom: 12px;">
            <input type="text" id="filter-export-input" readonly placeholder="Export String..." style="flex: 1; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 4px; font-family: monospace; font-size: 0.8rem;" />
            <button id="btn-copy-filter" style="padding: 8px; cursor: pointer; background: #10b981; color: white; border: none; border-radius: 4px; font-weight: bold;">Kopieren</button>
          </div>
          
          <div class="io-section" style="display: flex; gap: 8px; margin-bottom: 20px;">
            <input type="text" id="filter-import-input" placeholder="Import String hier einfügen..." style="flex: 1; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 4px; font-family: monospace; font-size: 0.8rem;" />
            <button id="btn-import-filter" style="padding: 8px; cursor: pointer; background: var(--accent-color); color: white; border: none; border-radius: 4px; font-weight: bold;">Importieren</button>
          </div>

          <div id="filter-checkboxes" style="max-height: 40vh; overflow-y: auto; text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; padding-right: 8px; font-size: 0.85rem;">
            <!-- Dynamically populated JS checkboxes -->
          </div>

          <button id="btn-save-filter" class="action-btn">Speichern & Schließen</button>
        </div>
      </div>
    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
